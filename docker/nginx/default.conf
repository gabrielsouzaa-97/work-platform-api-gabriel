server {
    listen 80 default_server;
    # listen 443 ssl default_server;
    # listen [::]:443 ssl default_server;
    # server_name api.mework360.com.br;

    # ssl_certificate     /etc/letsencrypt/live/api.mework360.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.mework360.com.br/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;

    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 16M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS only when TLS terminates here (ssl listen). Sending it on plain HTTP
    # breaks local dev: browsers upgrade localhost to https and hit ERR_SSL_PROTOCOL_ERROR.

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /up {
        # Nginx responds directly — avoids fastcgi_param HTTPS on triggering
        # Laravel's HTTPS redirect before the health endpoint can reply.
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # Do not force HTTPS for local HTTP — Laravel URL::forceScheme follows request()->isSecure().
        fastcgi_read_timeout 90s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_page 404 /index.php;
}
