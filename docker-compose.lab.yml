# LAB overlay — Traefik + production images (api.lab.mework360.com.br)
# Usage on LAB host:
#   docker compose -f docker-compose.yml -f docker-compose.lab.yml build
#   docker compose -f docker-compose.yml -f docker-compose.lab.yml up -d
#
# Assets: production app image bakes Vite output into public/build, but nginx
# must read the same tree. Shared named volume avoids host bind-mount without
# build/ (FOUC / unstyled panel). After image rebuild with new frontend assets,
# recreate the volume once: docker compose ... down && docker volume rm ..._deployer_public

volumes:
  deployer_public:

services:
  app:
    build:
      target: production
    env_file:
      - .env
    volumes: !override
      - deployer_public:/var/www/html/public
    entrypoint: ["/sbin/tini", "--", "php-fpm"]

  worker:
    build:
      target: production
    env_file:
      - .env
    volumes: !override []
    command: !override []
    entrypoint: ["/sbin/tini", "--", "php", "artisan", "queue:work", "redis", "--tries=3", "--timeout=90", "--sleep=3"]

  nginx:
    ports: !override []
    volumes: !override
      - deployer_public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mework360
      - proxy
    labels:
      traefik.enable: "true"
      traefik.docker.network: proxy
      traefik.http.routers.deployer-api.rule: Host(`api.lab.mework360.com.br`)
      traefik.http.routers.deployer-api.entrypoints: websecure
      traefik.http.routers.deployer-api.tls: "true"
      traefik.http.routers.deployer-api.tls.certresolver: letsencrypt
      traefik.http.services.deployer-api.loadbalancer.server.port: "80"

  mailpit:
    profiles:
      - dev

networks:
  proxy:
    external: true
