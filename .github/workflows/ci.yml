name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, redis, intl, zip, bcmath, gd, mbstring
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Pint (code style)
        run: ./vendor/bin/pint --test

      - name: Grep gate (platform adapters)
        run: bash scripts/grep-gate-adapters.sh

  test:
    name: Test (Pest/PHPUnit)
    runs-on: ubuntu-latest
    needs: lint

    services:
      mariadb:
        image: mariadb:11
        env:
          MYSQL_DATABASE: mework360_deployer_test
          MYSQL_USER: mework360_deployer
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: root_secret
          MARIADB_AUTO_UPGRADE: '1'
        ports: ['3306:3306']
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: testing
      APP_DEBUG: 'true'
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: '3306'
      DB_DATABASE: mework360_deployer_test
      DB_USERNAME: mework360_deployer
      DB_PASSWORD: secret
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: '6379'
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, redis, intl, zip, bcmath, gd, mbstring
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Run migrations
        run: php artisan migrate --force --no-interaction

      - name: Characterization integration gate (N33)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: php artisan test tests/Characterization/Integration/

      - name: Run tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: php artisan test

  security:
    name: Security (composer audit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Composer audit
        run: composer audit --no-dev --locked --abandoned=report

  openapi-external:
    name: OpenAPI (Redocly external)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Redocly lint (external spec)
        run: npx --yes @redocly/cli lint docs/openapi-external.yaml

      - name: External spec occ gate
        run: bash scripts/openapi-external-occ-gate.sh

  docker-production:
    name: Docker production (OpenAPI spec in image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        run: docker build --target production -t mework360-deployer:ci .

      - name: Verify OpenAPI spec bundled in image
        run: |
          docker run --rm mework360-deployer:ci test -f /var/www/html/storage/app/openapi-external.yaml
          docker run --rm mework360-deployer:ci grep -q 'openapi: 3.0.3' /var/www/html/storage/app/openapi-external.yaml
