# PR Auto-Assign — Assigns reviewers based on CODEOWNERS
# Uses GitHub's native CODEOWNERS + auto-assign action.
# No external dependencies. No secrets required.

name: PR Auto-Assign

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  assign:
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Auto-assign reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Skip if author is a bot
            if (pr.user.type === 'Bot') return;

            // Skip if reviewers already assigned
            if (pr.requested_reviewers.length > 0) return;

            // Get CODEOWNERS
            const fs = require('fs');
            let codeowners = '';
            for (const path of ['.github/CODEOWNERS', 'CODEOWNERS', 'docs/CODEOWNERS']) {
              try {
                codeowners = fs.readFileSync(path, 'utf8');
                break;
              } catch (e) { continue; }
            }

            if (!codeowners) {
              console.log('No CODEOWNERS file found. Skipping auto-assign.');
              return;
            }

            // Get changed files
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const changedPaths = files.map(f => f.filename);

            // Parse CODEOWNERS and find matching reviewers
            const reviewers = new Set();
            const lines = codeowners.split('\n').filter(l => l.trim() && !l.startsWith('#'));

            for (const line of lines) {
              const parts = line.trim().split(/\s+/);
              if (parts.length < 2) continue;

              const pattern = parts[0];
              const owners = parts.slice(1).map(o => o.replace('@', ''));

              // Simple glob matching
              const regex = new RegExp(
                '^' + pattern
                  .replace(/\./g, '\\.')
                  .replace(/\*/g, '[^/]*')
                  .replace(/\*\*/g, '.*')
                + (pattern.endsWith('/') ? '.*' : '$')
              );

              for (const path of changedPaths) {
                if (regex.test(path)) {
                  owners.forEach(o => reviewers.add(o));
                }
              }
            }

            // Remove PR author from reviewers
            reviewers.delete(pr.user.login);

            if (reviewers.size === 0) {
              console.log('No matching reviewers found in CODEOWNERS for changed files.');
              return;
            }

            // Assign reviewers (max 3)
            const reviewerList = [...reviewers].slice(0, 3);
            console.log(`Assigning reviewers: ${reviewerList.join(', ')}`);

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers: reviewerList
              });
            } catch (e) {
              console.log(`Could not assign some reviewers: ${e.message}`);
            }
